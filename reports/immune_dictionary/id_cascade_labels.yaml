# Immune Dictionary cascade-direction labels (cross_asym, CLAUDE.md sec 26).
# Benchmark cytokines (SCP cyt names; binary models train on these only):
#   IFNb, IFNg, IL1b, IL10, IL12, IL13, IL15, IL18, IL2, IL4, IL6, TNFa
# expected_sign: +1 a_to_b, -1 b_to_a, 0 NEGATIVE, null UNKNOWN/BIDIR.
labels:
  - axis: [IFNb, IFNg]
    pair_status: DIRECTIONAL_a_to_b
    expected_sign: 1
    benchmark_class: TYPE1_IFN_PRIME
    counts_in_benchmark: true
    upstream: IFNb
    reason: "Type-I IFN primes NK for IFNg (Nguyen 2002, Mack 2011).  IFNb upstream -> +1.  Distinct pathways IFNAR(STAT1/2) vs IFNGR(STAT1-GAS)."
  - axis: [IFNg, IL12]
    pair_status: BIDIRECTIONAL
    expected_sign: null
    benchmark_class: BIDIRECTIONAL
    counts_in_benchmark: false
    upstream: null
    reason: "Bidirectional feedback: IL-12 -> STAT4 -> IFNg in NK/T, and IFNg -> STAT1 -> Il12b in DCs/macs.  Direction cell-type-dependent in vivo; excluded from signed accuracy."
  - axis: [IFNg, IL15]
    pair_status: DIRECTIONAL_b_to_a
    expected_sign: -1
    benchmark_class: NK_IFNG
    counts_in_benchmark: true
    upstream: IL15
    reason: "IL-15 drives NK-cell IFNg in vivo (sec 2.7 NK cascade).  IL15 upstream -> -1."
  - axis: [IFNg, IL18]
    pair_status: DIRECTIONAL_b_to_a
    expected_sign: -1
    benchmark_class: NK_IFNG
    counts_in_benchmark: true
    upstream: IL18
    reason: "IL-18 synergizes with IL-12 to drive NK-cell IFNg (sec 2.7).  IL18 upstream -> -1."
  - axis: [IFNg, IL2]
    pair_status: DIRECTIONAL_b_to_a
    expected_sign: -1
    benchmark_class: NK_IFNG
    counts_in_benchmark: true
    upstream: IL2
    reason: "IL-2 supports NK-cell IFNg production (sec 2.7 cascade).  IL2 upstream -> -1."
  - axis: [IFNg, IL4]
    pair_status: NEGATIVE_NO_CASCADE
    expected_sign: 0
    benchmark_class: ANTAGONISM
    counts_in_benchmark: false
    upstream: null
    reason: "Th2 IL-4 suppresses Th1 IFNg (antagonism, not cascade).  |cross_asym| may still be large; DESCRIPTIVE per sec 26.4."
  - axis: [IL10, IL12]
    pair_status: NEGATIVE_NO_CASCADE
    expected_sign: 0
    benchmark_class: ANTAGONISM
    counts_in_benchmark: false
    upstream: null
    reason: "IL-10 -> STAT3 SUPPRESSES Il12b (Moore 2001).  Negative cascade -> DESCRIPTIVE per sec 26.4."
  - axis: [IL13, IL4]
    pair_status: UNKNOWN
    expected_sign: null
    benchmark_class: OVERLAP_STAT6
    counts_in_benchmark: false
    upstream: null
    reason: "IL-4 and IL-13 both signal STAT6 via type-II IL-4R; programs overlap heavily; cross_asym sign unreliable.  DESCRIPTIVE."
  - axis: [IL15, IL2]
    pair_status: UNKNOWN
    expected_sign: null
    benchmark_class: OVERLAP_STAT5
    counts_in_benchmark: false
    upstream: null
    reason: "IL-2 and IL-15 both signal common gamma-chain -> STAT5; programs overlap heavily; cross_asym sign unreliable.  DESCRIPTIVE."
  - axis: [IL1b, IL6]
    pair_status: DIRECTIONAL_a_to_b
    expected_sign: 1
    benchmark_class: NFKB_STAT3
    counts_in_benchmark: true
    upstream: IL1b
    reason: "IL-1R -> MyD88 -> NF-kB induces IL6; IL6 -> STAT3 (distinct).  IL1b upstream -> +1.  NF-kB vs STAT3 distinct -> precondition holds."
  - axis: [IL1b, TNFa]
    pair_status: UNKNOWN
    expected_sign: null
    benchmark_class: OVERLAP_NFKB
    counts_in_benchmark: false
    upstream: null
    reason: "Both IL1b and TNF signal NF-kB; programs overlap (sec 24 known failure).  cross_asym sign unreliable on shared activation axis.  DESCRIPTIVE."
  - axis: [IL6, TNFa]
    pair_status: DIRECTIONAL_b_to_a
    expected_sign: -1
    benchmark_class: NFKB_STAT3
    counts_in_benchmark: true
    upstream: TNFa
    reason: "TNF -> TNFR1 -> NF-kB induces IL6; IL6 -> STAT3.  TNFa upstream -> -1.  NF-kB vs STAT3 distinct (unlike IL1b/TNFa which share NF-kB)."
