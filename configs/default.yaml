data:
  manifest_path: /cs/labs/mornitzan/yam.arieli/datasets/Oesinghaus_pseudotubes/manifest.json
  n_hvgs: 4000                  # treat as hyperparameter, check sensitivity
  n_per_cell_type: 30
  min_cells_threshold: 10
  n_pseudo_tubes: 10

model:
  embedding_dim: 128
  attention_hidden_dim: 64
  n_classes: 91                 # 90 cytokines + PBS
  use_two_layer_attention: false

training:
  stage1_epochs: 50             # encoder pre-training
  stage2_epochs: 100            # MIL frozen encoder
  stage3_epochs: 50             # MIL fine-tune (optional)
  optimizer: sgd
  momentum: 0.9
  lr: 0.01
  lr_scheduler: null            # set to e.g. "cosine" if loss curves are erratic
  lr_warmup_epochs: 5
  kl_lambda: 0.1               # v2 only: weight for KL(a_CA || a_SA) divergence penalty
  aux_loss_weight: 0.5         # v2 only: weight for SA and CA auxiliary classification losses

dynamics:
  log_every_n_epochs: 1         # frequency of dynamics snapshot logging
  random_seeds: [42, 123, 7]    # run all three, check ordering stability
  # Confusion dynamics (analysis/confusion_dynamics.py)
  confusion_late_epoch_fraction: 0.3   # fraction of final epochs used for asymmetry score
  confusion_fdr_alpha: 0.05            # BH FDR threshold for cascade graph edges
  cascade_graph_min_seed_rho: 0.7      # min Spearman rho across seeds for reportable pairs
